<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockBallot | Elector Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/css/app.css?v=8">
    <style>
        html,
        body {
            margin: 0;
            background: #0a0a0a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .auth-card {
            max-width: 440px;
            margin: 40px auto;
            padding: 40px;
        }

        .auth-actions {
            margin-top: 24px;
            text-align: center;
        }

        .auth-actions a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .auth-actions a:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }

        .success-box {
            border-radius: var(--radius-md);
            border: 1px solid var(--success-border);
            background: var(--success-dim);
            color: var(--success);
            padding: 14px 18px;
            margin-bottom: 22px;
            font-weight: 500;
            font-size: 0.93rem;
        }
    </style>
</head>

<body>
    <nav class="topnav">
        <div class="topnav-inner">
            <a href="/" class="brand">
                <div class="brand-seal">&#9878;</div>
                <div class="brand-name">Block<span>Ballot</span></div>
            </a>
            <div class="nav-links">
                <a href="/login" class="nav-link active">Login</a>
                <a href="/register" class="nav-link">Register New Elector</a>
                            <a th:if="${session.VOTER_ID != null}" href="/logout" class="nav-link" style="color: var(--danger-text); font-weight: 600;">Sign Out</a>
            </div>
        </div>
    </nav>
    <div class="page-wrap">
        <section class="hero" style="min-height: 250px;">
            <div class="hero-bg"></div>
            <div class="hero-stripe-tricolor"></div>
            <div class="hero-content" style="padding: 40px 32px; text-align: center;">
                <h1 class="hero-title anim-2" style="margin: 0 auto;">
                    <span class="accent">Secure Portal</span>
                </h1>
            </div>
        </section>
        <main class="main-content">
            <div class="card auth-card anim-1">
                <div class="section-header">
                    <div class="section-title" style="font-size: 1.6rem;">Elector Authentication</div>
                    <div class="section-sub">Please enter your credentials to access the voting portal.</div>
                </div>

                <hr class="gold-divider">

                <form action="/do-login" method="post">
                    <div th:if="${errorMsg}" class="error-box" th:text="${errorMsg}"></div>
                    <div th:if="${successMsg}" class="success-box" th:text="${successMsg}"></div>

                    <div class="field-group">
                        <label for="voterId">EPIC / Voter ID Number</label>
                        <input type="text" name="voterId" id="voterId" required placeholder="e.g. ABC1234567"
                            autocomplete="off" autofocus>
                    </div>

                    <div class="field-group">
                        <label for="password">Security Password</label>
                        <input type="password" name="password" id="password" required placeholder="••••••••">
                    </div>

                    <button class="btn btn-primary" type="submit" style="width: 100%;">Authenticate &rarr;</button>
                </form>

                <div class="auth-actions">
                    <a href="/register">Not registered yet? Enroll as an elector.</a>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
