<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockBallot | Elector Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/css/app.css?v=8">
    <style>
        html,
        body {
            margin: 0;
            background: #0a0a0a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .auth-card {
            max-width: 500px;
            margin: 40px auto;
            padding: 40px;
        }

        .auth-actions {
            margin-top: 24px;
            text-align: center;
        }

        .auth-actions a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .auth-actions a:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <nav class="topnav">
        <div class="topnav-inner">
            <a href="/" class="brand">
                <div class="brand-seal">&#9878;</div>
                <div class="brand-name">Block<span>Ballot</span></div>
            </a>
            <div class="nav-links">
                <a href="/login" class="nav-link">Login</a>
                <a href="/register" class="nav-link active">Register New Elector</a>
                            <a th:if="${session.VOTER_ID != null}" href="/logout" class="nav-link" style="color: var(--danger-text); font-weight: 600;">Sign Out</a>
            </div>
        </div>
    </nav>
    <div class="page-wrap">
        <section class="hero" style="min-height: 250px;">
            <div class="hero-bg"></div>
            <div class="hero-stripe-tricolor"></div>
            <div class="hero-content" style="padding: 40px 32px; text-align: center;">
                <h1 class="hero-title anim-2" style="margin: 0 auto;">
                    <span class="accent">Elector Enrollment</span>
                </h1>
            </div>
        </section>
        <main class="main-content">
            <div class="card auth-card anim-1">
                <div class="section-header">
                    <div class="section-title" style="font-size: 1.6rem;">New Registration</div>
                    <div class="section-sub">Enroll into the electoral roll to cast your vote securely on the
                        blockchain.</div>
                </div>

                <hr class="gold-divider">

                <form action="/do-register" method="post">
                    <div th:if="${errorMsg}" class="error-box" th:text="${errorMsg}"></div>

                    <div class="field-group">
                        <label for="voterName">Full Legal Name</label>
                        <input type="text" name="voterName" id="voterName" required placeholder="John Doe"
                            autocomplete="off" autofocus>
                    </div>

                    <div class="field-group">
                        <label for="dateOfBirth">Date of Birth</label>
                        <input type="date" name="dateOfBirth" id="dateOfBirth" required max="2008-01-01">
                        <small style="color:var(--text-muted); font-size: 0.75rem; margin-top: 4px; display: block;">You
                            must be 18 or older.</small>
                    </div>

                    <div class="field-group">
                        <label for="constituencyId">Constituency</label>
                        <select name="constituencyId" id="constituencyId" required>
                            <option value="" disabled selected>&mdash; Choose Area &mdash;</option>
                            <option th:each="c : ${constituencies}" th:value="${c.constituencyId}"
                                th:text="${c.fullName}">Area</option>
                        </select>
                    </div>

                    <div class="field-group">
                        <label for="password">Secure Password</label>
                        <input type="password" name="password" id="password" required minlength="6"
                            placeholder="At least 6 characters">
                    </div>

                    <button class="btn btn-primary" type="submit" style="width: 100%;">Enroll &amp; Generate ID
                        &rarr;</button>
                </form>

                <div class="auth-actions">
                    <a href="/login">Already have an EPIC ID? Proceed to Login.</a>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
